name: Temporary Stage 2 Campaign Wiring

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/temporary-stage2-campaign-wire.yml'

permissions:
  contents: write

jobs:
  format-stage2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Format Campaign Requirements UI only
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import ast

          path = Path('app.py')
          text = path.read_text(encoding='utf-8')
          start_marker = '                campaign_requirements = gr.Textbox('
          end_marker = '                whisper = gr.Dropdown('
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Campaign UI block or Whisper anchor not found')

          clean_block = (
              '                campaign_requirements = gr.Textbox(\n'
              '                    label="📋 Campaign Requirements — opsional",\n'
              '                    placeholder=(\n'
              '                        "Tempel persyaratan kampanye di sini.\\n\\n"\n'
              '                        "Contoh:\\n"\n'
              '                        "- Speaker harus berbicara di setiap clip\\n"\n'
              '                        "- Hook kuat pada 1–3 detik pertama\\n"\n'
              '                        "- Bukan pure lifestyle\\n"\n'
              '                        "- Edit clean, modern, dan tajam\\n\\n"\n'
              '                        "Kosongkan untuk mode viral biasa."\n'
              '                    ),\n'
              '                    lines=9,\n'
              '                )\n'
          )
          text = text[:start] + clean_block + text[end:]
          ast.parse(text)
          path.write_text(text, encoding='utf-8')
          PY

          python -m py_compile app.py
          grep -F 'def pipeline(upload, drive_url, clip_count, clip_duration, whisper_mode, enable_ocr, campaign_requirements=""):' app.py
          grep -F '[upload, drive, count, duration, whisper, ocr_box, campaign_requirements]' app.py
          grep -F 'job / "campaign_requirements.txt"' app.py

      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet -- app.py; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.py
          git commit -m 'Format Campaign Requirements UI block'
          git push
