name: Temporary Stage 4 Finalize

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/temporary-stage4-campaign-results.yml'

permissions:
  contents: write

jobs:
  finalize-stage4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update completion message and validate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import ast
          path = Path('app.py')
          text = path.read_text(encoding='utf-8')
          old = '        yield snap("🎉 Tahap 3 selesai: Gemini Vision + Groq scoring + MediaPipe + animated smart crop aktif.")'
          new = '        yield snap("🎉 Tahap 4 selesai: campaign match score, requirement results, dan pipeline clipping aktif.")'
          if text.count(old) != 1:
              raise SystemExit('Completion message anchor not found exactly once.')
          text = text.replace(old, new, 1)
          ast.parse(text)
          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile app.py

      - name: Commit final Stage 4 message
        shell: bash
        run: |
          if git diff --quiet -- app.py; then
            echo 'No completion-message change required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.py
          git commit -m 'Finalize Stage 4 campaign result status'
          git push
