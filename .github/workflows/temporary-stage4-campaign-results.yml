ast.parse(text)
path.write_text(text, encoding='utf-8')
PY' | base64 -d > /tmp/stage4_patch.py
          python /tmp/stage4_patch.py
          python -m py_compile app.py
          grep -F 'campaign_match_score' app.py
          grep -F 'matched_requirements' app.py
          grep -F 'violated_requirements' app.py
